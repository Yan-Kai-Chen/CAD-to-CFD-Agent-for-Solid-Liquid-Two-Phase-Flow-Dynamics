[parallel]            ; parallel settings
thread_num = 16       ; number of threads

[Mesh]
Ni = 100
Nj = 100
Nk = 100
Cell_Len = 1; mm
BlockCellLen = 10

[Physical_Property]
rho_ref = 0.001;			  // g/mm^3 0.00713
Kine_Visc = 0.01;     // mm^2/s Kinematic viscosity of the liquid

[Init_Conditions]
U_Ini0 = 0           ;m/s
U_Ini1 = 0           ;m/s
U_Ini2 = 0           ;m/s
U_Max = 0.1          ;mm/s

[Boundary_Conditions]
Velo_Wall0 = 0.1          ;mm/s
Velo_Wall1 = 0          ;mm/s
Velo_Wall2 = 0          ;mm/s

[LB]
RT = 0.56

[Simulation_Settings]
TotalStep = 1000

[tolerance]
tol = 1e-4
